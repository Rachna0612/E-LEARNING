# Deployment — runs Nginx serving your static files
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elearning-app
  namespace: default
  labels:
    app: elearning
spec:
  replicas: 2
  selector:
    matchLabels:
      app: elearning
  template:
    metadata:
      labels:
        app: elearning
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '9113'
    spec:
      containers:
      - name: elearning
        image: nginx:alpine
        ports:
        - containerPort: 80
      - name: nginx-exporter
        image: nginx/nginx-prometheus-exporter:1.3
        args: ['-nginx.scrape-uri=http://localhost/nginx_status']
        ports:
        - containerPort: 9113
---
# Service — exposes the app
apiVersion: v1
kind: Service
metadata:
  name: elearning-service
  namespace: default
spec:
  selector:
    app: elearning
  ports:
  - name: http
    port: 80
    targetPort: 80
  - name: metrics
    port: 9113
    targetPort: 9113
  type: LoadBalancer