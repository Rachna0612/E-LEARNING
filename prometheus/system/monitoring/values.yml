# kube-prometheus-stack custom values for E-Learning project
 
# ── Grafana Settings ───────────────────────────
grafana:
  enabled: true
  adminPassword: 'DevOps@K8s2024'
  service:
    type: NodePort
    nodePort: 32000
  persistence:
    enabled: true
    size: 5Gi
  grafana.ini:
    server:
      root_url: 'http://YOUR_EC2_IP:32000'
 
# ── Prometheus Settings ────────────────────────
prometheus:
  enabled: true
  service:
    type: NodePort
    nodePort: 32001
  prometheusSpec:
    retention: 30d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ['ReadWriteOnce']
          resources:
            requests:
              storage: 10Gi
 
# ── Alertmanager ──────────────────────────────
alertmanager:
  enabled: true
  service:
    type: NodePort
    nodePort: 32002
 
# ── Node Exporter ─────────────────────────────
nodeExporter:
  enabled: true
 
# ── Kube State Metrics ────────────────────────
kubeStateMetrics:
  enabled: true