groups:
  - name: elearning_alerts
    rules:
 
    # Alert if server is down
    - alert: InstanceDown
      expr: up == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: 'Instance {{ $labels.instance }} is DOWN'
        description: 'The E-Learning server has been unreachable for 1 minute.'
 
    # Alert if CPU is too high
    - alert: HighCPUUsage
      expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode='idle'}[5m])) * 100) > 80
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: 'High CPU on {{ $labels.instance }}'
        description: 'CPU usage is above 80% for 5 minutes.'
 
    # Alert if memory is running low
    - alert: LowMemory
      expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 15
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: 'Low memory on {{ $labels.instance }}'
        description: 'Available memory is below 15%.'
 
    # Alert if disk is almost full
    - alert: DiskAlmostFull
      expr: (node_filesystem_avail_bytes{mountpoint='/'} / node_filesystem_size_bytes{mountpoint='/'}) * 100 < 20
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: 'Disk almost full on {{ $labels.instance }}'
        description: 'Disk space is below 20%.'