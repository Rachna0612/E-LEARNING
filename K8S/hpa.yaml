apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: learned-hpa
  namespace: learned
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: learned-deployment
  minReplicas: 2             # Always keep at least 2 pods running
  maxReplicas: 8             # Never exceed 8 (prevents runaway costs)
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70  # Scale up when CPU > 70%