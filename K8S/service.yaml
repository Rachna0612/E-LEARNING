apiVersion: v1
kind: Service
metadata:
  name: learned-service
  namespace: learned
spec:
  type: NodePort
  selector:
    app: learned              # Routes traffic to pods with this label
  ports:
  - name: http
    protocol: TCP
    port: 80                  # Port on the Service
    targetPort: 80            # Port inside the Pod/container
    nodePort: 30080           # External port (accessible from browser)