apiVersion: apps/v1
kind: Deployment
metadata:
  name: elearning-deployment
  namespace: elearning
  labels:
    app: elearning
spec:
  replicas: 2
  selector:
    matchLabels:
      app: elearning
  template:
    metadata:
      labels:
        app: elearning
    spec:
      containers:
      - name: elearning-container
        image: rachna06/e-learning:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "300m"
            memory: "128Mi"
            